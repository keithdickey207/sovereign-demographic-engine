# Local-only Neo4j — no cloud, no middleware SaaS.
# Start: docker compose up -d
# Browser: http://localhost:7474  (neo4j / sovereign_local)
# Bolt:    bolt://localhost:7687

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: sovereign-demographic-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/sovereign_local
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./cypher:/var/lib/neo4j/import/cypher:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
  neo4j_logs:
